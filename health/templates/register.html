{% extends 'base.html' %} {% load static %} {% block content %}

<style>
    /* Global Styles */
    
    body {
        font-family: 'Poppins', sans-serif;
        background: none;
    }
    /* Register Page Container with Background */
    
    .register-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
        padding: 40px 20px;
    }
    /* Overlay for better readability */
    
    .register-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 100%);
        webkit-backdrop-filter: blur(5px);
    }
    /* Register Container */
    
    .register-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
        animation: fadeInUp 0.8s ease;
    }
    /* Register Card */
    
    .register-card {
        background: rgba(255, 255, 255, 0.95);
        webkit-backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 50px 40px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: transform 0.3s ease;
    }
    
    .register-card:hover {
        transform: translateY(-5px);
    }
    /* Header Section */
    
    .register-card h2 {
        font-size: 2.2rem;
        font-weight: 700;
        color: #333;
        text-align: center;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .subtitle {
        text-align: center;
        color: #666;
        font-size: 1rem;
        margin-bottom: 35px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f0f0f0;
    }
    /* Form Group */
    
    .form-group {
        margin-bottom: 25px;
        position: relative;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #555;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
    }
    /* Input Fields */
    
    .form-group input {
        width: 100%;
        padding: 14px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: white;
        outline: none;
    }
    
    .form-group input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    .form-group input::placeholder {
        color: #aaa;
        font-size: 0.95rem;
    }
    /* Validation Styles */
    
    .form-group input:valid {
        border-color: #2ecc71;
    }
    
    .form-group input:invalid:not(:placeholder-shown) {
        border-color: #e74c3c;
    }
    /* Password Strength Indicator (Optional) */
    
    .password-strength {
        margin-top: 8px;
        font-size: 0.85rem;
        display: flex;
        gap: 5px;
    }
    
    .strength-bar {
        height: 4px;
        flex: 1;
        background: #e0e0e0;
        border-radius: 2px;
        transition: all 0.3s ease;
    }
    /* Register Button */
    
    .register-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 20px;
        position: relative;
        overflow: hidden;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .register-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s ease;
    }
    
    .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .register-btn:hover::before {
        left: 100%;
    }
    
    .register-btn:active {
        transform: translateY(0);
    }
    /* Login Link */
    
    .login-link {
        text-align: center;
        margin-top: 30px;
        color: #666;
        font-size: 0.95rem;
    }
    
    .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
    }
    
    .login-link a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: width 0.3s ease;
    }
    
    .login-link a:hover {
        color: #764ba2;
    }
    
    .login-link a:hover::after {
        width: 100%;
    }
    /* Error Messages */
    
    .error-message {
        color: #e74c3c;
        font-size: 0.85rem;
        margin-top: 5px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    /* Success Message */
    
    .success-message {
        background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        color: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
        animation: slideInDown 0.5s ease;
    }
    /* Animation */
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    @keyframes slideInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    /* Responsive Design */
    
    @media (max-width: 576px) {
        .register-card {
            padding: 30px 20px;
        }
        .register-card h2 {
            font-size: 1.8rem;
        }
        .form-group input {
            padding: 12px 15px;
        }
        .register-btn {
            padding: 14px;
        }
    }
    /* Floating Labels Animation (Optional) */
    
    .form-group {
        position: relative;
    }
    
    .form-group input:focus+label,
    .form-group input:not(:placeholder-shown)+label {
        transform: translateY(-25px);
        font-size: 0.85rem;
        color: #667eea;
    }
    /* Icons in Input Fields (Optional) */
    
    .input-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
        transition: color 0.3s ease;
    }
    
    .form-group input:focus~.input-icon {
        color: #667eea;
    }
    /* Bootstrap Grid Override for Center Alignment */
    
    .row {
        margin: 0;
    }
    
    .col-md-6 {
        padding: 15px;
    }
    /* Custom Checkbox for Terms (Optional) */
    
    .terms-checkbox {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0;
    }
    
    .terms-checkbox input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }
    
    .terms-checkbox label {
        margin: 0;
        color: #666;
        font-size: 0.9rem;
    }
    
    .terms-checkbox a {
        color: #667eea;
        text-decoration: none;
    }
    /* Loading State for Button */
    
    .register-btn.loading {
        position: relative;
        color: transparent;
    }
    
    .register-btn.loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 3px solid white;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
    /* Tooltip Styles */
    
    .tooltip-icon {
        display: inline-block;
        width: 16px;
        height: 16px;
        background: #e0e0e0;
        color: #666;
        border-radius: 50%;
        text-align: center;
        line-height: 16px;
        font-size: 12px;
        margin-left: 5px;
        cursor: help;
        position: relative;
    }
    
    .tooltip-icon:hover::before {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 0.8rem;
        white-space: nowrap;
        z-index: 10;
    }
</style>

<!-- Add Poppins Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Register Page with Background -->
<div class="register-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="register-container">
                    <div class="register-card">
                        <h2>Create Your Account</h2>
                        <p class="subtitle">Join AyurPrevent for Natural Healthcare 🌿</p>

                        <!-- Success Message (if any) -->
                        {% if messages %} {% for message in messages %}
                        <div class="success-message">
                            {{ message }}
                        </div>
                        {% endfor %} {% endif %}

                        <form method="post" id="registerForm">
                            {% csrf_token %}

                            <!-- Username -->
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" placeholder="Enter your username" required minlength="3" maxlength="20">
                                <span class="input-icon">👤</span>
                                <div class="error-message" id="username-error"></div>
                            </div>

                            <!-- Phone -->
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" name="phone" placeholder="Enter your 10-digit phone number" pattern="[0-9]{10}" required maxlength="10">
                                <span class="input-icon">📱</span>
                                <div class="error-message" id="phone-error"></div>
                            </div>

                            <!-- Email -->
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                                <span class="input-icon">✉️</span>
                                <div class="error-message" id="email-error"></div>
                            </div>

                            <!-- Password -->
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" placeholder="Create a password" required minlength="8">
                                <span class="input-icon">🔒</span>
                                <div class="password-strength">
                                    <div class="strength-bar" id="strength1"></div>
                                    <div class="strength-bar" id="strength2"></div>
                                    <div class="strength-bar" id="strength3"></div>
                                </div>
                                <div class="error-message" id="password-error"></div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="form-group">
                                <label for="confirm_password">Confirm Password</label>
                                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
                                <span class="input-icon">🔐</span>
                                <div class="error-message" id="confirm-password-error"></div>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="terms-checkbox">
                                <input type="checkbox" id="terms" name="terms" required>
                                <label for="terms">
                                    I agree to the <a href="#">Terms & Conditions</a> and 
                                    <a href="#">Privacy Policy</a>
                                </label>
                            </div>

                            <button type="submit" class="register-btn" id="registerBtn">
                                Create Account
                            </button>

                        </form>

                        <p class="login-link">
                            Already have an account?
                            <a href="{% url 'login' %}">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional JavaScript for Form Validation and Password Strength -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm_password');
        const phone = document.getElementById('phone');
        const registerBtn = document.getElementById('registerBtn');

        // Password strength indicator
        password.addEventListener('input', function() {
            const strength = checkPasswordStrength(this.value);
            updateStrengthBars(strength);
        });

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            return Math.min(strength, 3);
        }

        function updateStrengthBars(strength) {
            const bars = document.querySelectorAll('.strength-bar');
            const colors = ['#e74c3c', '#f39c12', '#2ecc71'];

            bars.forEach((bar, index) => {
                if (index < strength) {
                    bar.style.background = colors[strength - 1];
                } else {
                    bar.style.background = '#e0e0e0';
                }
            });
        }

        // Confirm password validation
        confirmPassword.addEventListener('input', function() {
            if (this.value !== password.value) {
                document.getElementById('confirm-password-error').textContent = 'Passwords do not match';
            } else {
                document.getElementById('confirm-password-error').textContent = '';
            }
        });

        // Phone number validation
        phone.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length !== 10) {
                document.getElementById('phone-error').textContent = 'Please enter exactly 10 digits';
            } else {
                document.getElementById('phone-error').textContent = '';
            }
        });

        // Form submission loading state
        form.addEventListener('submit', function(e) {
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
        });
    });
</script>

{% endblock %}
