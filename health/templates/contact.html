{% extends 'base.html' %} {% block content %}

<style>
    .contact-section {
        padding: 60px 20px;
        background: #f1f8e9;
    }
    
    .contact-container {
        max-width: 1000px;
        margin: auto;
    }
    
    .contact-title {
        text-align: center;
        font-size: 36px;
        color: #2e7d32;
        margin-bottom: 20px;
    }
    
    .contact-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
    }
    
    .contact-info p {
        font-size: 18px;
        margin: 10px 0;
    }
    
    .form-group {
        margin-bottom: 15px;
    }
    
    input,
    textarea {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    
    button {
        background-color: #2e7d32;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    
    button:hover {
        background-color: #1b5e20;
    }
</style>

<div class="contact-section">
    <div class="contact-container">

        <h1 class="contact-title">Contact AyurPrevent</h1>

        <!-- Emergency Details -->
        <div class="contact-card contact-info">
            <h2>🚑 Emergency Support</h2>
            <p><strong>AyurPrevent Emergency Helpline:</strong> +91 98765 43210</p>
            <p><strong>24/7 Support Number:</strong> +91 91234 56789</p>
            <p><strong>Email:</strong> support@ayurprevent.com</p>
            <p><strong>Location:</strong> Chennai, Tamil Nadu, India</p>
        </div>

        <!-- Contact Form -->
        <div class="contact-card">
            <h2>📩 Send Us a Message</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
